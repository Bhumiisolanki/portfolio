<!DOCTYPE html>
<html>
    <head>
        <title>
            Array
        </title>
    </head>
    <body>
        <script>
            var Car = new Array(3);

Car[0] = "Ford";

Car[1] = "Toyota";

Car[2] = "Honda";

var Car2 = new Array("Ford", "Toyota", "Honda");

var Car3 = ["audi", "innova", "vagon"];

document.write(Car2); // output : Ford,Toyota,Honda

Car2.push("Yamaha");

document.write(Car2); // output : Ford,Toyota,Honda,Yamaha

Car2.pop();

document.write(Car2); // output : Ford,Toyota,Honda

var data = Car2.concat(Car3);

document.write(data); // output : Ford,Toyota,Honda,audi,innova,vagon
        </script>
    </body>
</html>
