<!doctype html>
<html>
  <head>
    <title>Variable Argument Function</title>
  </head>

  <body>
    <p id="demo"></p>

    <script>
      function sum() {
        var s = 0;

        for (var i = 0; i < arguments.length; i++) {
          s += arguments[i];
        }

        return s;
      }

      document.getElementById("demo").innerHTML = sum(10, 20, 30);
    </script>
  </body>
</html>
