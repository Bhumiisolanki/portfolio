<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gray Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f2f2f2;
        font-family: Arial;
      }

      .container {
        width: 900px;
        height: 500px;
        background: #bfbfbf;
        border: 4px solid white;

        display: grid;

        grid-template-columns: 3fr 1fr;
        grid-template-rows: 50px 1fr 50px;

        gap: 4px;
      }

      .header {
        grid-column: 1/3;
        background: #a6a6a6;
        border: 2px solid white;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .content {
        background: #b3b3b3;
        border: 2px solid white;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .right {
        display: grid;
        grid-template-rows: 1fr 1fr 1fr;
        gap: 4px;
      }

      .box {
        background: #a6a6a6;
        border: 2px solid white;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .footer {
        grid-column: 1/3;
        background: #999999;
        border: 2px solid white;

        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">Header</div>

      <div class="content">Content</div>

      <div class="right">
        <div class="box">HTML</div>
        <div class="box">CSS</div>
        <div class="box">JS</div>
      </div>

      <div class="footer">Footer</div>
    </div>
  </body>
</html>
