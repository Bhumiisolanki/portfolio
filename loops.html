<!doctype html>
<html>
  <head>
    <title>Loop Program</title>
  </head>

  <body>
    <!-- Numbers Section -->
    <h1>Print Numbers 1 to 10</h1>
    <p id="demo1"></p>

    <!-- Student Names Section -->
    <h1>Student Names</h1>
    <p id="demo2"></p>

    <!--Total Marks Section -->
    <h1>Total Marks</h1>
    <p id="demo3"></p>

    <!-- Multiplication table -->
    <h1>Multiplication Table</h1>
    <p id="demo4"></p>

    <!-- Even Numbers ---->
    <h1>Even Numbers</h1>
    <p id="demo5"></p>

    <!-- Odd Numbers ---->
    <h1>Odd Numbers</h1>
    <p id="demo6"></p>

    <!-- ATM PIN Validation -->
    <h1>ATM PIN Validation</h1>
    <p id="demo7"></p>

    <!-- Password Validation -->
    <h1>Password Validation</h1>
    <p id="demo8"></p>

    <script>
      // Print Numbers 1 to 10
      var numbers = "";

      for (var i = 1; i <= 10; i++) {
        numbers += i + "<br>";
      }

      document.getElementById("demo1").innerHTML = numbers;

      // Display Student Names
      var students = ["Bhumi", "Dhruv", "Sikha ", "Rudrax", "Snehal"];

      var names = "";

      for (var j = 0; j < students.length; j++) {
        names += students[j] + "<br>";
      }

      document.getElementById("demo2").innerHTML = names;

      //Calculate Total Marks
      var marks = [78, 85, 90, 67, 88];
      var total = 0;
      for (var i = 0; i < marks.length; i++) {
        total += marks[i];
      }
      document.getElementById("demo3").innerHTML = "Total Marks =" + total;

      //Multiplication table
      var num = 5;
      var table = "";
      for (var i = 1; i <= 10; i++) {
        table += num + "x" + i + "=" + num * i + "<br>";
      }
      document.getElementById("demo4").innerHTML = table;

      //Even numbers
      var even = "";
      for (var i = 1; i <= 20; i++) {
        if (i % 2 == 0) {
          even += i + "<br>";
        }
      }
      document.getElementById("demo5").innerHTML = even;

      //Odd numbers
      var i = 1;
      var odd = "";
      while (i <= 20) {
        if (i % 2 != 0) {
          odd += i + "<br>";
        }
        i++;
        document.getElementById("demo6").innerHTML = odd;

        //ATM PIN Validation

        var correctPin = 1234;
        var enteredPin = 1234;

        do {
          if (enteredPin == correctPin) {
            document.getElementById("demo7").innerHTML = "PIN is Correct";
          } else {
            document.getElementById("demo7").innerHTML = "Invalid PIN";
          }
        } while (false);
      }

      //Password Validation
      var password = "admin123";

      for (var i = 1; i <= 1; i++) {
        if (password.length >= 8) {
          document.getElementById("demo8").innerHTML = "Valid Password";
        } else {
          document.getElementById("demo8").innerHTML = "Password is Too Short";
        }
      }
    </script>
  </body>
</html>
