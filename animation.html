<!DOCTYPE html>
<html>
    <head>
        <title> Animation Demo </title>
        <style>
            body{
                color:rgb(199, 15, 46);
                text-align: center;
                margin-top: 50px;
                background-color: pink;

            }
            .box{
                width: 100px;
                height: 100px;
                background-color: rgb(211, 27, 211);
                margin: 100px auto;
                animation: myAnimation 4s infinite;
            }
            @keyframes myAnimation{
                0%{
                    transform:translateX(0px);

                }
                25%{
                    transform: translateX(200px);

                }
                50%{
                    transform:translate(200px) rotate(45deg);
                }
                75%{
                    transform: scale(1.5);
                }
                100%{
                    transform: translateX(0px);
                }
                
            }
        </style>

    </head>
    <body>
        <h1> Animated Box </h1>
        <div class ="box"></div>
       
    </body>
</html>
