<!doctype html>
<html>
  <head>
    <title> JSON Array and Object </title>
  </head>
  <body>
    <h2> Access Array Values </h2>

    <p id="demo"></p>

    <script>
      var myJSON = '{"name":"John", "age":30, "cars":["Ford", "BMW", "Fiat"]}';

      var myObj = JSON.parse(myJSON);

      document.getElementById("demo").innerHTML = myObj.cars[0];
    </script>
  </body>
</html>
