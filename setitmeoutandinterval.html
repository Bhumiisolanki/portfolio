<!DOCTYPE html>
<html>
  <head>
    <title>setTimeout and setInterval</title>
  </head>

  <body>
    <script>
      // setTimeout runs only once after 2 seconds
      setTimeout(showTimeoutMessage, 2000);

      function showTimeoutMessage() {
        alert("setTimeout : Welcome to ASOIT");
      }

      // setInterval runs again and again every 2 seconds
      setInterval(showIntervalMessage, 2000);

      function showIntervalMessage() {
        alert("setInterval : Welcome to ASOIT");
      }
    </script>
  </body>
</html>
